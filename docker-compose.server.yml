version: "3.9"
services:
  paisho-server:
    build:
      context: .
      dockerfile: server/Dockerfile
    container_name: paisho-server
    restart: unless-stopped
    ports:
      - "8080:8080"
    environment:
      PAISHO_JWT_SECRET: "replace-this-with-long-random-secret"
      PAISHO_DB_PATH: /data/paisho.db
    volumes:
      - paisho_data:/data

volumes:
  paisho_data:
