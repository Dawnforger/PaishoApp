version: "3.9"
services:
  paisho-server:
    build:
      # IMPORTANT:
      # Set this to the absolute path where this repo is stored on your NAS.
      # Example: /volume1/docker/paisho/PaishoApp
      context: /volume1/docker/paisho/PaishoApp
      dockerfile: server/Dockerfile
    container_name: paisho-server
    restart: unless-stopped
    ports:
      - "8080:8080"
    environment:
      PAISHO_JWT_SECRET: "replace-with-very-long-random-secret"
      PAISHO_DB_PATH: /data/paisho.db
    volumes:
      - /volume1/docker/paisho/data:/data
